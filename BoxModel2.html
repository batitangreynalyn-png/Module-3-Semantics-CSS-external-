<!Doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="HTML5, HTML 5, Semantics">
    <title>CSS Boxed Model Example</title>


    <style>
      body {
        font-family: Arial, sans-serif;
        text-align: center;
        background-color: #f4f4f4;
        margin: 20px;
      }


        .box {
            width: 250px;
            height: 150px;
            background-color: #29a709;
            color: white;
            padding: 20px;
            border: 5px solid #0A5DA6;
            margin: 20px auto;
            text-align: center;
            box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.3);
        }


        .box:hover {
            background-color: #027333;
            border-color: #F2E527;
        }


    </style>
    </head>
<body>
    <h2> CSS Box Model Example</h2>


    <div class="box">
    <p> This is a box. </p>
    </div>
   
    </body>
</html>
