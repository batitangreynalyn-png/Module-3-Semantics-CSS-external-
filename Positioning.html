<!Doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="HTML5, HTML 5, Semantics">
    <title>CSS Position Example</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 90%;
            max-width: 800;
            margin: auto;
        }

        .static-box {
            position: static;
            background: #29A7D9;
            padding: 10px;
            color: white;
            margin-bottom: 10px;
        }

        .relative-box {
            position: relative;
            top: 20px;
            left: 20px;
            background: #0A5DA6;
            padding: 10px;
            color: white;
        }

        .absolute-box {
            position: absolute;
            top: 50px;
            left: 50px;
            background: pink;
            padding: 10px;
            color: black;
        }

        .fixed-box {
            position: fixed;
            top: 0;
            right: 0;
            background: #222059;
            padding: 10px;
            color: white;
            width: 150px;
            text-align: center;
        }

        .sticky-box {
            position: sticky;
            top: 0;
            background: #027333;
            padding: 10px;
            color: white;
        }

        .content {
            height: 150vh;
            background: #f0f0f0;
            padding: 20px;
        }
    </style>
    </head>

<body>
    <div class="container">
        <div class="static-box">Static Position (Default)</div>
        <div class="relative-box">Relative Position (Moves relative to itself)</div>

        <div class="sticky-box">Sticky Position (Stays visible when scrolling)</div>

        <div class="content">
            Scroll down to see the sticky header effect.
            <div class="absolute-box">Absolute Position (Moves relative to nearest positioned ancestor)</div>
        </div>
    </div>

    <div class="fixed-box">Fixed Position (Stays in place when scrolling)</div>
    
</body>
</html>
